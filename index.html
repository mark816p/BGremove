<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover</title>
    <meta name="description" content="Remove backgrounds from multiple images privately. Free, offline, no uploads.">
    
    <!-- Preload fonts (using Inter as modern fallback for Avenir) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- JSZip for bulk downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    


    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <nav class="nav">
                <a href="#" class="logo-group">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>
                            <path d="m9 12 2 2 4-4"></path>
                        </svg>
                    </div>
                    <span class="logo-text">Background Remover</span>
                </a>
                <div class="theme-toggle">
                    <button id="themeToggleBtn" aria-label="Toggle theme">
                        <!-- Moon Icon -->
                        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                        </svg>
                        <!-- Sun Icon (Hidden by default) -->
                        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="m4.93 4.93 1.41 1.41"></path>
                            <path d="m17.66 17.66 1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="m6.34 17.66-1.41 1.41"></path>
                            <path d="m19.07 4.93-1.41 1.41"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="hero-section">
                <h1 class="hero-title">Remove Image Backgrounds <span class="highlight-text">Locally</span></h1>
                <p class="hero-subtitle">100% private, free, and fast. Powered by WebAssembly. Everything happens directly in your browser.</p>
            </div>

            <!-- Drag & Drop Zone -->
            <div class="upload-zone" id="dropZone">
                <input type="file" id="fileInput" multiple accept="image/png, image/jpeg, image/webp" hidden>
                <div class="upload-content">
                    <div class="upload-icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" x2="12" y1="3" y2="15"></line>
                        </svg>
                    </div>
                    <h3 class="upload-title">Click to upload or drag and drop</h3>
                    <p class="upload-hint">SVG, PNG, JPG or GIF (max. 800x400px)</p>
                </div>
            </div>

            <!-- Processing Status -->
            <div class="status-container" id="statusContainer" style="display: none;">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <p class="status-text" id="statusText">Processing models...</p>
            </div>

            <!-- Actions Bar (Shows when files are processed) -->
            <div class="actions-bar" id="actionsBar" style="display: none;">
                <h2 class="results-title">Results (<span id="processedCount">0</span>/<span id="totalCount">0</span>)</h2>
                <button class="btn btn-primary" id="downloadAllBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    Download All as ZIP
                </button>
            </div>

            <!-- Results Gallery -->
            <div class="gallery" id="gallery">
                <!-- Image items will be injected here -->
            </div>
        </main>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
